image: rocker/r-ver:4.4.1

stages:
  - test

Comparison:
  stage: test
  script:
    - |
      R -e '
        install.version("tidyverse", version = "2.0.0", repos = "http://cran.rstudio.com/")
        install.version("opalr", version = "3.4.2", repos = "http://cran.rstudio.com/")
        install.version("diffdf", version = "1.1.1", repos = "http://cran.rstudio.com/")
      '

    - |
      R -e '
        ## Read in initializations
        source("CI_CD/CICD_procedure.R")

        ## Run the tests
        source("CI_CD/CICD_check.R")
      '
  artifacts:
    paths:
      - fakedata_CICD_diffs.Rdata
    when: always
