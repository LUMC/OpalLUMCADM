
default:
  image: rocker/tidyverse:devel

stages:
  - build
  - tables
  - checks
  - diffdf
  - views

Build:
  stage: build
  script:
    - R CMD build .
    - PKG_FILE=$(ls *.tar.gz)
    - Rscript ./cicd/packages/install_packages.R
    - R CMD INSTALL "$PKG_FILE"

Tables:
  stage: tables
  before_script:
    - R CMD build .
    - PKG_FILE=$(ls *.tar.gz)
    - Rscript ./cicd/packages/install_packages.R
    - R CMD INSTALL "$PKG_FILE"
  script:
    - Rscript ./cicd/01_tables/adm.table_get.R
    - Rscript ./cicd/01_tables/adm.table_save_write.R
    - Rscript ./cicd/01_tables/adm.table_save_update.R
    - Rscript ./cicd/01_tables/adm.table_save_overwrite.R
  after_script:
    - Rscript ./cicd/01_tables/cleanup.R

Checks:
  stage: checks
  before_script:
    - R CMD build .
    - PKG_FILE=$(ls *.tar.gz)
    - Rscript ./cicd/packages/install_packages.R
    - R CMD INSTALL "$PKG_FILE"
    - Rscript ./cicd/02_checks/create_dataset.R
  script:
    - Rscript ./cicd/02_checks/check.character_ids.R
    - Rscript ./cicd/02_checks/check.columns_cat.R
    - Rscript ./cicd/02_checks/check.columns_var.R
    - Rscript ./cicd/02_checks/check.date.R
    - Rscript ./cicd/02_checks/check.datetime.R
    - Rscript ./cicd/02_checks/check.duplicated_ids.R
    - Rscript ./cicd/02_checks/check.duplicated_rows.R
    - Rscript ./cicd/02_checks/check.encrypted_values.R
    - Rscript ./cicd/02_checks/check.entitytype.R
    - Rscript ./cicd/02_checks/check.infinite.R
    - Rscript ./cicd/02_checks/check.minmax.R
    - Rscript ./cicd/02_checks/check.required_columns.R
    - Rscript ./cicd/02_checks/check.valuetype.R
    - Rscript ./cicd/02_checks/check.run_all.R

DiffDF:
  stage: diffdf
  before_script:
    - R CMD build .
    - PKG_FILE=$(ls *.tar.gz)
    - Rscript ./cicd/packages/install_packages.R
    - R CMD INSTALL "$PKG_FILE"
    - Rscript ./cicd/03_diffdf/create_dataset.R
  script:
    - Rscript ./cicd/03_diffdf/adm.diffdf.R

Views:
  stage: views
  before_script:
    - R CMD build .
    - PKG_FILE=$(ls *.tar.gz)
    - Rscript ./cicd/packages/install_packages.R
    - R CMD INSTALL "$PKG_FILE"
  script:
    - Rscript ./cicd/04_views/adm.view_create.R
  after_script:
    - Rscript ./cicd/04_views/cleanup.R
